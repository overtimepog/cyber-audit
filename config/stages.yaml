# Cyber Audit — Stage Configuration
# 8-stage vulnerability discovery agent harness
#
# ALL stages run through Codex CLI (like evilsocket/audit uses Claude Code).
# Codex handles tools natively — no custom agent loop needed.
# Your ChatGPT subscription covers all costs.
#
# Deliberate disagreement: Hunt and Validate use different models.
#   Hunt:   gpt-5.5 (frontier, finds vulns aggressively)
#   Validate: gpt-5.4 (different model, tries to disprove)

gapfill_iterations: 3
feedback_iterations: 2

stages:
  recon:
    model: openai/gpt-5.5
    concurrency: 1
    tools:
      - Read
      - Grep
      - Glob
      - Bash
    max_turns: 2
    permission_mode: acceptEdits
    repair_attempts: 1

  hunt:
    model: openai/gpt-5.5
    concurrency: 5
    tools:
      - Read
      - Grep
      - Glob
      - Bash
    max_turns: 2
    permission_mode: acceptEdits
    repair_attempts: 1

  validate:
    model: openai/gpt-5.4
    concurrency: 3
    tools:
      - Read
      - Grep
      - Glob
      - Bash
    max_turns: 2
    permission_mode: acceptEdits
    repair_attempts: 1

  gapfill:
    model: openai/gpt-5.4
    concurrency: 1
    tools:
      - Read
      - Grep
    max_turns: 2
    permission_mode: acceptEdits
    repair_attempts: 1

  dedupe:
    model: openai/gpt-5.4
    concurrency: 1
    tools:
      - Read
    max_turns: 2
    permission_mode: acceptEdits
    repair_attempts: 1

  trace:
    model: openai/gpt-5.5
    concurrency: 3
    tools:
      - Read
      - Grep
      - Glob
      - Bash
    max_turns: 2
    permission_mode: acceptEdits
    repair_attempts: 1

  feedback:
    model: openai/gpt-5.4
    concurrency: 1
    tools:
      - Read
      - Grep
    max_turns: 2
    permission_mode: acceptEdits
    repair_attempts: 1

  report:
    model: openai/gpt-5.5
    concurrency: 1
    tools:
      - Read
    max_turns: 2
    permission_mode: acceptEdits
    repair_attempts: 1
