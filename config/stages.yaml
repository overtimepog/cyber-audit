# Cyber Audit — Stage Configuration
# 8-stage vulnerability discovery agent harness
#
# Models use OpenRouter-style naming:
#   deepseek/* → DeepSeek API (DEEPSEEK_API_KEY from ~/.hermes/.env)
#   openai/*   → Codex CLI (ChatGPT subscription via `codex exec`)
#
# GPT-5.5: frontier model, better at complex reasoning, tool use, and coding.
#           Use for: hunt (finding vulns), report (structured synthesis).
# GPT-5.4: cheaper, still strong. Use for: gapfill, dedupe, feedback.
#
# Deliberate disagreement: Hunt and Validate use different providers.

gapfill_iterations: 3
feedback_iterations: 2

stages:
  recon:
    model: openai/gpt-5.5
    concurrency: 1
    tools:
      - Read
      - Grep
      - Glob
      - Bash
    max_turns: 60
    permission_mode: acceptEdits
    repair_attempts: 2

  hunt:
    model: openai/gpt-5.5
    concurrency: 5
    tools:
      - Read
      - Grep
      - Glob
      - Bash
    max_turns: 25
    permission_mode: acceptEdits
    repair_attempts: 1

  validate:
    model: deepseek/deepseek-v4-pro
    concurrency: 3
    tools:
      - Read
      - Grep
      - Glob
    max_turns: 25
    permission_mode: acceptEdits
    repair_attempts: 1

  gapfill:
    model: openai/gpt-5.4
    concurrency: 1
    tools:
      - Read
      - Grep
    max_turns: 25
    permission_mode: acceptEdits
    repair_attempts: 1

  dedupe:
    model: openai/gpt-5.4
    concurrency: 1
    tools:
      - Read
    max_turns: 25
    permission_mode: acceptEdits
    repair_attempts: 1

  trace:
    model: deepseek/deepseek-v4-pro
    concurrency: 3
    tools:
      - Read
      - Grep
      - Glob
      - Bash
    max_turns: 25
    permission_mode: acceptEdits
    repair_attempts: 1

  feedback:
    model: openai/gpt-5.4
    concurrency: 1
    tools:
      - Read
      - Grep
    max_turns: 25
    permission_mode: acceptEdits
    repair_attempts: 1

  report:
    model: openai/gpt-5.5
    concurrency: 1
    tools:
      - Read
    max_turns: 25
    permission_mode: acceptEdits
    repair_attempts: 1
